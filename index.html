<!DOCTYPE html>
<html>
<head>
  <title>Code Review</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    textarea {
      width: 300px;
      height: 100px;
      margin: 10px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      font-weight: bold;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }
    .approve { background: green; color: white; }
    .reject { background: red; color: white; }
  </style>
</head>

<body>

  <h2>✅ Code Review</h2>

  <p id="dev"></p>

  <textarea id="comment" placeholder="Enter your comment..."></textarea>

  <br>

  <button class="approve" onclick="submitReview('Approved')">✅ Approve</button>
  <button class="reject" onclick="submitReview('Rejected')">❌ Reject</button>

  <script>
    // ✅ Get URL parameters
    const params = new URLSearchParams(window.location.search);
    const devEmail = params.get("dev_email");

    document.getElementById("dev").innerText = "Developer: " + devEmail;

    async function submitReview(status) {
      const comment = document.getElementById("comment").value;

      // ✅ Call GitHub workflow
      await fetch("https://api.github.com/repos/Heisenberg027/Innovation/actions/workflows/send-review-result.yml/dispatches", {
        method: "POST",
        headers: {
          "Accept": "application/vnd.github+json",
          "Authorization": "Bearer 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"
        },
        body: JSON.stringify({
          ref: "main",
          inputs: {
            dev_email: devEmail,
            status: status,
            comment: comment
          }
        })
      });

      alert("✅ Review submitted!");
    }
  </script>

</body>
</html>
